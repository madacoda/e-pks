services:
  app:
    image: ghcr.io/${GITHUB_REPOSITORY:-username/e-pks}:latest
    container_name: e_pks_app
    restart: unless-stopped
    working_dir: /var/www/e-pks
    ports:
      - "9001:9000"
    volumes:
      - ./:/var/www/e-pks
      # Do not map local vendor or node_modules to avoid overriding container ones in production if built locally, 
      # but for a simple vps deploy, mapping . is common if building on the server.
    networks:
      - e_pks_network
    depends_on:
      - db

  db:
    image: postgres:18-alpine
    container_name: e_pks_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_DATABASE:-e_pks_db}
      POSTGRES_USER: ${DB_USERNAME:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-password}
    volumes:
      - e_pks_db_data:/var/lib/postgresql/data
    networks:
      - e_pks_network

networks:
  e_pks_network:
    driver: bridge

volumes:
  e_pks_db_data:

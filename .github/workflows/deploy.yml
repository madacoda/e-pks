name: Deploy to VPS with GHCR

on:
  push:
    branches:
      - main # Jalankan otomatis setiap ada push ke branch main

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-and-push-image:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Log in to the Container registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (tags, labels) for Docker
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
          labels: ${{ steps.meta.outputs.labels }}

  deploy-to-vps:
    needs: build-and-push-image
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Copy docker-compose and configs
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USERNAME }}
          key: ${{ secrets.VPS_SSH_KEY }}
          passphrase: ${{ secrets.VPS_SSH_PASSPHRASE }}
          source: "docker-compose.prod.yml,docker/nginx/default.conf"
          target: "/var/www/e-pks"

      - name: Execute deployment commands via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USERNAME }}
          key: ${{ secrets.VPS_SSH_KEY }}
          passphrase: ${{ secrets.VPS_SSH_PASSPHRASE }}
          script: |
            # 1. Buat folder proyek di VPS jika belum ada
            mkdir -p /var/www/e-pks
            cd /var/www/e-pks
            
            # 2. Login ke GHCR di dalam VPS (untuk akses pull image private)
            echo "${{ secrets.CR_PAT }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin
            
            # 3. Pull image terbaru yang baru saja di-build oleh GitHub Actions
            docker pull ghcr.io/${{ github.repository }}:latest
            
            # 4. Copy public directory to host so host NGINX can serve CSS/JS/Images
            mkdir -p /var/www/e-pks/public
            docker create --name temp_app ghcr.io/${{ github.repository }}:latest
            docker cp temp_app:/var/www/e-pks/public/. /var/www/e-pks/public/
            docker rm temp_app
            
            # 5. Pastikan .env ada agar Docker tidak membuat folder bernama .env
            touch /var/www/e-pks/.env
            
            # 6. Restart container dengan image baru (Zero Downtime)
            export GITHUB_REPOSITORY=${{ github.repository }}
            docker compose -f docker-compose.prod.yml up -d
            
            # 7. Bersihkan image Docker lama agar VPS tidak penuh
            docker image prune -f
            
            # 8. Eksekusi optimasi framework & migrasi di dalam container yang sedang berjalan
            docker exec e_pks_app php artisan optimize:clear
            docker exec e_pks_app php artisan optimize
            docker exec e_pks_app php artisan migrate --force

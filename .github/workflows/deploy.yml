name: Deploy to VPS with GHCR

on:
  push:
    branches:
      - main # Jalankan otomatis setiap ada push ke branch main

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-and-push-image:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Log in to the Container registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (tags, labels) for Docker
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
          labels: ${{ steps.meta.outputs.labels }}

  deploy-to-vps:
    needs: build-and-push-image
    runs-on: ubuntu-latest
    steps:
      - name: Execute deployment commands via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USERNAME }}
          key: ${{ secrets.VPS_SSH_KEY }}
          passphrase: ${{ secrets.VPS_SSH_PASSPHRASE }}
          script: |
            # 1. Masuk ke folder proyek di VPS
            cd /var/www/e-pks
            
            # 2. Login ke GHCR di dalam VPS (untuk akses pull image private)
            echo "${{ secrets.CR_PAT }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin
            
            # 3. Download/Pull kode docker-compose.prod.yml & konfigurasi NGINX terbaru
            git pull origin main
            
            # 4. Pull image terbaru yang baru saja di-build oleh GitHub Actions
            docker pull ghcr.io/${{ github.repository }}:latest
            
            # 5. Restart container dengan image baru (Zero Downtime)
            docker-compose -f docker-compose.prod.yml up -d
            
            # 6. Bersihkan image Docker lama agar VPS tidak penuh
            docker image prune -f
            
            # 7. Eksekusi optimasi framework & migrasi di dalam container yang sedang berjalan
            docker exec e_pks_app composer install --optimize-autoloader --no-dev
            docker exec e_pks_app php artisan optimize:clear
            docker exec e_pks_app php artisan optimize
            docker exec e_pks_app php artisan migrate --force
